name: Python
on: workflow_dispatch
jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Install dependencies
        run: |
          python.exe -m pip install --upgrade pip
      - name: Build
        env:
          BUILD_TOKEN: ${{ secrets.BUILD_TOKEN }}
        run: |
          Invoke-Expression -Command "$env:BUILD_TOKEN" *> "build.txt"
